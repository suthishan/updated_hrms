<div class="content">
				<!-- Breadcrumb -->
				<div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
					<div class="my-auto mb-2">
						<h2 class="mb-1">Holiday Calender</h2>
						<nav>
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item">
									<a [routerLink]="routes.index"><i class="ti ti-smart-home"></i></a>
								</li>
								<li class="breadcrumb-item">
									Attendance
								</li>
								<li class="breadcrumb-item active" aria-current="page">Holiday Calender</li>
							</ol>
						</nav>
					</div>
					<div class="d-flex my-xl-auto right-content align-items-center flex-wrap">
						<div class="mb-2">
							<a href="javascript:void(0)" data-bs-toggle="modal" data-bs-target="#add_event" class="btn btn-primary d-flex align-items-center"><i class="ti ti-circle-plus me-2"></i>Add New Holiday</a>
						</div>
						<div class="head-icons ms-2">
							<a href="javascript:void(0);" class="" data-bs-toggle="tooltip" data-bs-placement="top" data-bs-original-title="Collapse" id="collapse-header">
								<i class="ti ti-chevrons-up"></i>
							</a>
						</div>
					</div>
				</div>
				<!-- /Breadcrumb -->

				<div class="card">
					<div class="card-body">
						<div id='external-events'></div>
						<div id="calendar2"></div>
					</div>
				</div>
			</div>	

				<!-- Add New Event -->
		<div class="modal fade" id="add_event">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">
					<div class="modal-header">
						<h4 class="modal-title">Add New Event</h4>
						<button type="button" class="btn-close custom-btn-close" data-bs-dismiss="modal" aria-label="Close">
							<i class="ti ti-x"></i>
						</button>
					</div>
					<form>
						<div class="modal-body">
							<div class="row">
								<div class="col-12">
									<div class="mb-3">
										<label class="form-label">Holiday Name</label>
										<input type="text" class="form-control">
									</div>
								</div>
								<div class="col-12">
									<div class="mb-3">
										<label class="form-label">Holiday Date</label>
										<div class="input-icon-end position-relative ngxdate">
											<input type="text" class="form-control datetimepicker" bsDatepicker [bsConfig]="{adaptivePosition:true,dateInputFormat:'DD-MM-YYYY'}" container=".ngxdate">
											<span class="input-icon-addon">
												<i class="ti ti-calendar text-gray-7"></i>
											</span>
										</div>
									</div>
								</div>
							</div>
						</div>
						<div class="modal-footer">
							<button type="button" class="btn btn-light me-2" data-bs-dismiss="modal">Cancel</button>
							<button type="submit" class="btn btn-primary">Add Holiday</button>
						</div>
					</form>
				</div>
			</div>
		</div>
		<!-- /Add New Event -->

		<!-- Event -->
		<div class="modal fade" id="event_modal" #eventModal  [ngClass]="{'show': showEventDetailsModal}" [ngStyle]="{'display': showEventDetailsModal ? 'block' : 'none'}">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">
					<div class="modal-header bg-dark modal-bg">
						<div class="modal-title text-white"><span id="eventTitle">{{ eventDetails?.title }}</span></div>
						<button type="button" class="btn-close custom-btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="handleEventDetailsClose()">
							<i class="ti ti-x"></i>
						</button>
					</div>
					<div class="modal-body">
						<p class="d-flex align-items-center fw-medium text-dark mb-3"><i class="ti ti-calendar-check text-default me-2"></i>01 jan,2026 to 01 jan,2026</p>
						<p class="d-flex align-items-center fw-medium text-dark mb-0"><i class="ti ti-calendar-check text-default me-2"></i>12:00 AM to 12:59 PM</p>
					</div>
				</div>
			</div>
		</div>
		<!-- /Event -->

		<!-- Backdrop -->
@if (showEventDetailsModal) {
  <div class="modal-backdrop fade show" (click)="handleEventDetailsClose()"></div>
}
